<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TILE//SYNC - PIXEL_HAVEN ARCADE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="portrait-warning">
        <h2 class="glitch-text" style="font-size: 2rem;">PLEASE ROTATE</h2>
        <p class="subtitle">LANDSCAPE MODE REQUIRED</p>
    </div>
    <div class="game-wrapper">
        <div class="game-container" id="gameContainer">
            <div id="app" class="app-container">
                <!-- Landing Overlay -->
                <div id="overlay" class="overlay">
                    <div class="overlay-content">
                        <h1 class="glitch-text" data-text="TILE//SYNC">TILE//SYNC</h1>
                        <p class="subtitle">PIXEL_HAVEN // ARCADE_OS</p>
                        <div class="mode-selection">
                            <button class="mode-btn safe" onclick="game.start('safe')">
                                <span class="mode-title">SAFE MODE</span>
                                <span class="mode-desc">Pairs & Quads // No Decay</span>
                            </button>
                            <button class="mode-btn spicy" onclick="game.start('spicy')">
                                <span class="mode-title">SPICY MODE</span>
                                <span class="mode-desc">Balanced Mix // Light Decay</span>
                            </button>
                            <button class="mode-btn chaos" onclick="game.start('chaos')">
                                <span class="mode-title">CHAOS MODE</span>
                                <span class="mode-desc">Hex Heavy // Severe Decay</span>
                            </button>
                        </div>
                    </div>
                </div>

                <main class="game-layout">
                    <!-- Left Side: Board -->
                    <div class="board-container">
                        <div id="mahjong-board" class="mahjong-board"></div>
                    </div>

                    <!-- Right Side: UI Panel -->
                    <aside class="ui-panel">
                        <div class="panel-section selection-section">
                            <span class="section-label">BUFFER</span>
                            <div id="selected-preview-slot" class="selected-preview-slot"></div>
                            <div id="selection-counter" class="selection-counter">0 / 0</div>
                        </div>

                        <div class="panel-section action-section">
                            <button id="match-btn" class="btn-primary" onclick="game.tryMatch()">
                                SYNC MATCH
                                <small>[SPACE]</small>
                            </button>
                            <button id="shuffle-btn" class="btn-secondary" onclick="game.shuffle()">
                                REFLOW BOARD
                                <small>[S]</small>
                            </button>
                        </div>

                        <div class="panel-section hammer-section">
                            <span class="section-label">HAMMER CHARGE</span>
                            <div class="charge-meter-container">
                                <div id="charge-fill" class="charge-meter-fill" style="width: 0%"></div>
                            </div>
                            <div id="charge-status" class="charge-status">STATUS: STANDBY</div>
                            <button id="hammer-btn" class="btn-hammer" onclick="game.activateHammer()">
                                <span class="hammer-icon">🔨</span>
                                DESTROY SELECTION
                            </button>
                        </div>

                        <div class="game-info">
                            <div class="info-item">
                                <span class="info-label">SCORE</span>
                                <span id="score-display" class="info-value">000000</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">TIME</span>
                                <span id="time-display" class="info-value">00s</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">DECIMATION</span>
                                <span id="decay-display" class="info-value">0%</span>
                            </div>
                        </div>
                    </aside>
                </main>
                
                <!-- Feedback Overlay -->
                <div id="toast" class="toast">MATCH COMPLETED</div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
<script src="../../core/arcade_bridge.js"></script>
</body>
</html>
